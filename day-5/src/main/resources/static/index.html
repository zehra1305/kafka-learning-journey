<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Güven-Bank | İşlem Paneli</title>
    <style>
        /* Sayfayı ortalamak için flex kullanıyoruz */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h2 {
            color: #2c3e50;
            margin-bottom: 1.5rem;
            font-weight: 600;
        }

        .input-group {
            margin-bottom: 1rem;
            text-align: left;
        }

        label {
            display: block;
            font-size: 0.9rem;
            color: #7f8c8d;
            margin-bottom: 5px;
            margin-left: 5px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #dfe6e9;
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #3498db;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
            margin-top: 1rem;
        }

        button:hover {
            background-color: #27ae60;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        #status {
            margin-top: 1.5rem;
            padding: 10px;
            border-radius: 6px;
            font-size: 0.9rem;
            display: none; /* Başlangıçta gizli */
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Güven-Bank İşlem</h2>

    <div class="input-group">
        <label>Gönderen Müşteri</label>
        <input type="text" id="musteriAdi" placeholder="Ad Soyad">
    </div>

    <div class="input-group">
        <label>Kart Numarası</label>
        <input type="text" id="kartno" placeholder="**** **** **** ****">
    </div>

    <div class="input-group">
        <label>İşlem Tutarı (TL)</label>
        <input type="number" id="para" placeholder="0.00">
    </div>

    <div class="input-group">
        <label>Alıcı Müşteri</label>
        <input type="text" id="alici" placeholder="Alıcı Ad Soyad">
    </div>

    <button onclick="islemGonder()">Transferi Başlat</button>

    <div id="status"></div>
</div>

<script>
    async function islemGonder() {
        const statusDiv = document.getElementById('status');

        // DTO yapına uygun veri hazırlama
        const data = {
            musteriAdi: document.getElementById('musteriAdi').value,
            kartno: document.getElementById('kartno').value,
            para: parseFloat(document.getElementById('para').value),
            alici: document.getElementById('alici').value
        };

        // Görsel geri bildirim
        statusDiv.style.display = "block";
        statusDiv.style.backgroundColor = "#e1f5fe";
        statusDiv.style.color = "#0277bd";
        statusDiv.innerText = "İşlem Kafka'ya iletiliyor...";

        try {
            // Senin Controller endpoint'in: /islem
            const response = await fetch('http://localhost:8080/islem', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (response.ok) {
                statusDiv.style.backgroundColor = "#d4edda";
                statusDiv.style.color = "#155724";
                statusDiv.innerText = "✓ Başarılı: İşlem kuyruğa alındı.";
            } else {
                statusDiv.style.backgroundColor = "#f8d7da";
                statusDiv.style.color = "#721c24";
                statusDiv.innerText = "× Hata: " + response.status;
            }
        } catch (error) {
            statusDiv.style.backgroundColor = "#fff3cd";
            statusDiv.style.color = "#856404";
            statusDiv.innerText = "⚠ Sunucu hatası! (CORS veya kapalı)";
        }
    }
</script>

</body>
</html>
