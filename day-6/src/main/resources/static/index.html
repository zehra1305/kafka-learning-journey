<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kafka Shopping Admin | Day-6</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --primary-color: #ff6000;
            --secondary-color: #2c3e50;
            --success-color: #27ae60;
            --error-color: #e74c3c;
            --bg-color: #f4f7f6;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .admin-card {
            background: white;
            width: 450px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            overflow: hidden;
            border-top: 5px solid var(--primary-color);
        }

        .header {
            background: var(--secondary-color);
            color: white;
            padding: 25px;
            text-align: center;
        }

        .header i { font-size: 2.5rem; margin-bottom: 10px; color: var(--primary-color); }
        .header h2 { margin: 0; font-weight: 600; letter-spacing: 1px; }

        .form-body { padding: 30px; }

        .input-group {
            margin-bottom: 20px;
            position: relative;
            width: 100%;
            box-sizing: border-box;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 42px;
            color: #95a5a6;
            z-index: 2;
        }

        label {
            display: block;
            font-size: 0.9rem;
            color: #7f8c8d;
            margin-bottom: 8px;
            font-weight: 600;
        }

        input, select {
            width: 100%;
            padding: 12px 12px 12px 45px;
            border: 2px solid #ecf0f1;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s;
            outline: none;
            /* KRİTİK DÜZELTME: Taşmayı önler */
            box-sizing: border-box;
            display: block;
        }

        input:focus, select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 8px rgba(255, 96, 0, 0.1);
        }

        button {
            width: 100%;
            padding: 15px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            box-sizing: border-box;
        }

        button:hover {
            background: #e65600;
            transform: translateY(-2px);
        }

        button:active { transform: translateY(0); }

        #statusBox {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
            font-size: 0.9rem;
            text-align: center;
            animation: fadeIn 0.5s;
            box-sizing: border-box;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .success { background: #dff9fb; color: var(--success-color); border: 1px solid var(--success-color); display: block !important; }
        .error { background: #ffeaa7; color: var(--error-color); border: 1px solid var(--error-color); display: block !important; }
    </style>
</head>
<body>

<div class="admin-card">
    <div class="header">
        <i class="fas fa-shipping-fast"></i>
        <h2>Sipariş Yönetimi</h2>
    </div>

    <div class="form-body">
        <div class="input-group">
            <label>Müşteri</label>
            <i class="fas fa-user"></i>
            <input type="text" id="musteriAdi" placeholder="Ad Soyad giriniz">
        </div>

        <div class="input-group">
            <label>Ürün Seçimi</label>
            <i class="fas fa-box-open"></i>
            <input type="text" id="urunAdi" placeholder="Ürün adı giriniz">
        </div>

        <div class="input-group">
            <label>Birim Fiyat (TL)</label>
            <i class="fas fa-tag"></i>
            <input type="number" id="fiyat" placeholder="0.00">
        </div>

        <div class="input-group">
            <label>Lojistik Durumu</label>
            <i class="fas fa-truck-loading"></i>
            <select id="gonderildimi">
                <option value="true">Paketlendi & Gönderildi</option>
                <option value="false">Beklemede (Hata Simülasyonu)</option>
            </select>
        </div>

        <button onclick="siparisGonder()">
            <i class="fas fa-paper-plane"></i>
            Siparişi Kafka'ya İlet
        </button>

        <div id="statusBox"></div>
    </div>
</div>

<script>
    async function siparisGonder() {
        const statusBox = document.getElementById('statusBox');

        const payload = {
            musteriAdi: document.getElementById('musteriAdi').value,
            urunAdi: document.getElementById('urunAdi').value,
            fiyat: parseFloat(document.getElementById('fiyat').value),
            gonderildimi: document.getElementById('gonderildimi').value === "true"
        };

        if(!payload.musteriAdi || !payload.urunAdi || isNaN(payload.fiyat)) {
            showStatus("Lütfen tüm alanları doldurun!", "error");
            return;
        }

        try {
            const response = await fetch('/gonder', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                showStatus("Sipariş başarıyla kuyruğa iletildi! <br><b>Terminali kontrol et.</b>", "success");
            } else {
                showStatus("Bir hata oluştu! Endpoint'i kontrol et.", "error");
            }
        } catch (error) {
            showStatus("Bağlantı hatası! Server açık mı?", "error");
        }
    }

    function showStatus(text, type) {
        const box = document.getElementById('statusBox');
        box.innerHTML = text;
        box.className = type;
        box.style.display = 'block';
        setTimeout(() => { box.style.display = 'none'; }, 5000);
    }
</script>

</body>
</html>
